name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install test dependency
        run: python3 -m pip install pytest
      - name: Validate examples
        run: make validate
      - name: Run tests
        run: make test
