name: release-dry-run

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install test dependency
        run: python3 -m pip install pytest
      - name: Release dry run
        run: make release-dry-run
